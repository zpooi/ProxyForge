services:
  proxyforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: proxyforge:latest
    container_name: proxyforge
    restart: unless-stopped
    environment:
      DB_PATH: /data/data.db
      PROJECT_ROOT: /app
      LISTEN_ADDR: :7800
      TZ: Asia/Shanghai
    ports:
      - "7800:7800"
      - "7843:7843"
    # Let the userspace WireGuard socket use its 7 MiB queues instead of the
    # small kernel default. This is namespaced to the container and needs no
    # privileged mode or NET_ADMIN capability.
    sysctls:
      net.core.rmem_max: "7340032"
      net.core.wmem_max: "7340032"
    volumes:
      - proxyforge-data:/data

volumes:
  proxyforge-data:
